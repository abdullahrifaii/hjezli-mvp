<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hjezli - Book Local Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">Hjezli | حجزلي</h1>
            <a href="/provider" class="text-sm bg-indigo-500 px-3 py-1.5 rounded hover:bg-indigo-400 transition">Business Owner?</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto mt-6 p-4">
        <div class="bg-amber-50 border-l-4 border-amber-500 text-amber-900 p-4 rounded shadow-sm">
            <p class="font-bold">💵 Cash Only Economy Policy</p>
            <p class="text-sm">No credit cards needed. Book your appointment online instantly and pay cash directly to the provider at the shop.</p>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                <h2 class="font-semibold text-lg mb-3">Find a Service</h2>
                <label class="block text-sm text-gray-600 mb-1">Location</label>
                <select id="locationFilter" onchange="loadProviders()" class="w-full p-2 border rounded-md mb-3 bg-gray-50">
                    <option value="">All Lebanon</option>
                    <option value="Beirut">Beirut</option>
                    <option value="Jounieh">Jounieh</option>
                    <option value="Saida">Saida</option>
                    <option value="Tripoli">Tripoli</option>
                </select>

                <label class="block text-sm text-gray-600 mb-1">Category</label>
                <select id="categoryFilter" onchange="loadProviders()" class="w-full p-2 border rounded-md bg-gray-50">
                    <option value="">All Categories</option>
                    <option value="Barber">Barber / Men's Salon</option>
                    <option value="Beauty">Beauty Salon</option>
                    <option value="Spa">Spa & Massage</option>
                </select>
            </div>

            <div id="bookingFormContainer" class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 hidden">
                <h3 class="font-semibold text-indigo-600 mb-2">Book at <span id="selectedShopName">...</span></h3>
                <form id="appointmentForm" onsubmit="submitBooking(event)" class="space-y-3">
                    <input type="hidden" id="selectedProviderId">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Your Full Name</label>
                        <input type="text" id="custName" required class="w-full p-2 border rounded bg-gray-50 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">WhatsApp Phone Number</label>
                        <input type="tel" id="custPhone" placeholder="+961" required class="w-full p-2 border rounded bg-gray-50 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Date & Time</label>
                        <input type="datetime-local" id="appTime" required class="w-full p-2 border rounded bg-gray-50 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white p-2 rounded font-semibold text-sm hover:bg-green-500 shadow">
                        Confirm Free Booking
                    </button>
                </form>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Available Shops</h2>
            <div id="providersList" class="space-y-3">
                <p class="text-gray-500 text-sm">Loading local businesses...</p>
            </div>
        </div>
    </main>

    <script>
        async function loadProviders() {
            const loc = document.getElementById('locationFilter').value;
            const cat = document.getElementById('categoryFilter').value;
            let url = `/api/providers?`;
            if(loc) url += `location=${loc}&`;
            if(cat) url += `category=${cat}`;

            const res = await fetch(url);
            const providers = await res.json();
            const listDiv = document.getElementById('providersList');
            listDiv.innerHTML = '';

            if (providers.length === 0) {
                listDiv.innerHTML = `<p class="text-gray-500 text-sm p-4 bg-white rounded border">No shops registered in this area yet.</p>`;
                return;
            }

            providers.forEach(p => {
                listDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-lg text-gray-800">${p.business_name}</h3>
                                ${p.is_premium ? '<span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded-full font-semibold">Premium</span>' : ''}
                            </div>
                            <p class="text-xs text-gray-500">${p.category} • 📍 ${p.location}</p>
                        </div>
                        <button onclick="selectShop(${p.id}, '${p.business_name}')" class="bg-indigo-600 text-white text-sm px-4 py-2 rounded font-semibold hover:bg-indigo-500 transition shadow-sm">
                            Book Now
                        </button>
                    </div>
                `;
            });
        }

        function selectShop(id, name) {
            document.getElementById('selectedProviderId').value = id;
            document.getElementById('selectedShopName').innerText = name;
            document.getElementById('bookingFormContainer').classList.remove('hidden');
            document.getElementById('bookingFormContainer').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitBooking(e) {
            e.preventDefault();
            const payload = {
                provider_id: parseInt(document.getElementById('selectedProviderId').value),
                customer_name: document.getElementById('custName').value,
                customer_phone: document.getElementById('custPhone').value,
                appointment_time: new Date(document.getElementById('appTime').value).toISOString(),
                price_cash_usd: 0.0 // Handled strictly via cash later, default zero metric for generic booking
            };

            const res = await fetch('/api/appointments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('🎉 Appointment booked successfully! The vendor will contact you on WhatsApp.');
                document.getElementById('appointmentForm').reset();
                document.getElementById('bookingFormContainer').classList.add('hidden');
            } else {
                alert('Error processing booking.');
            }
        }

        // Initial setup run
        window.onload = loadProviders;
    </script>
</body>
</html>
